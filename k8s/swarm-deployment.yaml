apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarm
  namespace: children-of-israel
  labels:
    app: swarm
    tier: all
spec:
  replicas: 2
  selector:
    matchLabels:
      app: swarm
  template:
    metadata:
      labels:
        app: swarm
    spec:
      containers:
        - name: swarm
          image: children-of-israel-swarm:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "children_of_israel.health"]
          ports:
            - containerPort: 8000
              name: health
          envFrom:
            - secretRef:
                name: swarm-secrets
          env:
            - name: SWARM_CHECKPOINTING_BACKEND
              value: "postgres"
          volumeMounts:
            - name: config
              mountPath: /app/config/mission.yaml
              subPath: mission.yaml
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: config
          configMap:
            name: swarm-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: swarm-service
  namespace: children-of-israel
spec:
  selector:
    app: swarm
  ports:
    - port: 80
      targetPort: 8000
      name: http
  type: ClusterIP
