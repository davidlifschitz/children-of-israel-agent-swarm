# mission.yaml
# Static mission configuration for the Children of Israel Agent Swarm.
# Loaded at runtime by llm.py (model routing) and moses.py (SLA enforcement).

mission:
  name: "Children of Israel Agent Swarm"
  version: "1.0"
  description: >
    A hierarchical AI agent swarm governed by a three-tier law layer
    (Ten Commandments, 613 Commandments, Oral Law) and organized into
    12 tribal archetypes following the Jethro 5-tier orchestration model.

# ---------------------------------------------------------------------------
# SLAs
# ---------------------------------------------------------------------------
sla:
  moses_ruling_seconds: 300         # OL-004: Silence of Moses timeout
  tier1_response_seconds: 60
  tier2_response_seconds: 45
  tier3_response_seconds: 30
  tier4_response_seconds: 20
  hermes_fallback_seconds: 10       # time to wait before falling back from Hermes to tribal node

# ---------------------------------------------------------------------------
# Per-tribe LLM model routing
# All tribes routed to local Ollama (llama3.2) for local dev.
# To restore cloud models, update provider/model per tribe below.
# ---------------------------------------------------------------------------
tribe_model_routing:

  # Tier 1 - Senior judges
  - tribe_id: "judah"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "levi"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "dan"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "joseph"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  # Tier 2 - Enforcement
  - tribe_id: "simeon"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  # Tier 3 - Mid-level workers
  - tribe_id: "issachar"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "zebulun"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "asher"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  # Tier 4 - Leaf executors
  - tribe_id: "reuben"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "naphtali"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "gad"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

  - tribe_id: "benjamin"
    provider: "openai"
    model: "llama3.2"
    json_mode: true

# ---------------------------------------------------------------------------
# Checkpointing
# ---------------------------------------------------------------------------
checkpointing:
  backend: "memory"   # Options: "memory" | "postgres" | "redis"
  postgres_url: null  # Set via POSTGRES_URL env var
  redis_url: null     # Set via REDIS_URL env var
